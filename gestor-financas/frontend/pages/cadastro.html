<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Gestor Financas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>Criar conta</h1>
      <p class="muted">Cadastre-se para organizar suas receitas, despesas e orcamentos.</p>

      <div id="mensagem" class="message"></div>

      <form id="cadastroForm" class="form">
        <div class="form-group">
          <label for="nomeCadastro">Nome</label>
          <input id="nomeCadastro" type="text" required>
        </div>

        <div class="form-group">
          <label for="emailCadastro">Email</label>
          <input id="emailCadastro" type="email" required>
        </div>

        <div class="form-group">
          <label for="senhaCadastro">Senha</label>
          <input id="senhaCadastro" type="password" minlength="6" required>
        </div>

        <button class="button" type="submit">Criar conta</button>
      </form>

      <p class="muted">
        Ja tem conta?
        <a class="brand" href="login.html">Entrar</a>
      </p>
    </section>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
