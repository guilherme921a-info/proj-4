<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Gestor Financas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="app-header">
    <nav class="nav">
      <a class="brand" href="home.html">Gestor Financas</a>
      <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="transacoes.html">Transacoes</a>
        <a href="cadastro-transacao.html">Nova transacao</a>
        <a href="orcamentos.html">Orcamentos</a>
        <a href="relatorios.html">Relatorios</a>
        <button class="link-button" type="button" onclick="logout()">Sair</button>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="page-title">
      <div>
        <h1>Visao geral</h1>
        <p class="muted">Resumo atual das suas movimentacoes.</p>
      </div>
      <a class="button" href="cadastro-transacao.html">Nova transacao</a>
    </div>

    <section class="grid summary-grid">
      <article class="summary-card">
        <span>Receitas</span>
        <strong id="receitas" class="positive">R$ 0,00</strong>
      </article>
      <article class="summary-card">
        <span>Despesas</span>
        <strong id="despesas" class="negative">R$ 0,00</strong>
      </article>
      <article class="summary-card">
        <span>Saldo</span>
        <strong id="saldo">R$ 0,00</strong>
      </article>
    </section>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/transacoes.js"></script>
</body>
</html>
