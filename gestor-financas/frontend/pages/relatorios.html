<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatorios | Gestor Financas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="app-header">
    <nav class="nav">
      <a class="brand" href="home.html">Gestor Financas</a>
      <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="transacoes.html">Transacoes</a>
        <a href="cadastro-transacao.html">Nova transacao</a>
        <a href="orcamentos.html">Orcamentos</a>
        <a href="relatorios.html">Relatorios</a>
        <button class="link-button" type="button" onclick="logout()">Sair</button>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="page-title">
      <div>
        <h1>Relatorios</h1>
        <p class="muted">Indicadores consolidados por movimentacao e categoria.</p>
      </div>
    </div>

    <section class="grid summary-grid">
      <article class="summary-card">
        <span>Total de receitas</span>
        <strong id="receitas" class="positive">R$ 0,00</strong>
      </article>
      <article class="summary-card">
        <span>Total de despesas</span>
        <strong id="despesas" class="negative">R$ 0,00</strong>
      </article>
      <article class="summary-card">
        <span>Saldo final</span>
        <strong id="saldo">R$ 0,00</strong>
      </article>
    </section>

    <section class="panel" style="margin-top: 16px;">
      <h2>Despesas por categoria</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Categoria</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="despesasPorCategoria"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/relatorios.js"></script>
</body>
</html>
